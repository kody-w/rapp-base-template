name: Process RAPP Base requests

on:
  issues:
    types: [opened]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rapp-base-write-main
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
    steps:
      - name: Check out main
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: main
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"
      - name: Reconcile, validate, and push
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONDONTWRITEBYTECODE: "1"
          REQUIRE_NODE: "1"
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          success=0
          for attempt in 1 2 3; do
            echo "Reconciliation attempt ${attempt}/3"
            git fetch --no-tags origin main
            git reset --hard origin/main
            git clean -fd -- .work state api versions registry.json
            mkdir -p .work
            event_args=()
            if [[ "${GITHUB_EVENT_NAME}" == "issues" ]]; then
              event_args=(--event "${GITHUB_EVENT_PATH}")
            fi
            python3 scripts/fetch_issues.py \
              --output .work/issues.json "${event_args[@]}"
            python3 scripts/reconcile.py --input .work/issues.json
            rm -rf .work
            python3 scripts/build.py
            python3 scripts/check_monotonic.py --base origin/main
            make check
            git add -A -- state api versions registry.json
            if git diff --cached --quiet; then
              success=1
              break
            fi
            git commit -m "chore(state): reconcile public issue commands"
            if git push origin HEAD:main; then
              success=1
              break
            fi
            echo "Push raced; discarding the candidate and recomputing."
          done
          test "${success}" -eq 1
          git fetch --no-tags origin main
          git reset --hard origin/main
          git clean -fd -- .work
      - name: Deliver committed receipts
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 scripts/deliver_receipts.py
